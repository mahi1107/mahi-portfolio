name: Build Verification & CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    name: Lint, Typecheck and Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20'
          cache: 'npm'
          cache-dependency-path: ms-frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd ms-frontend
          npm ci

      - name: Run ESLint Verification
        run: |
          cd ms-frontend
          npm run lint --if-present

      - name: Run TypeScript Verification
        run: |
          cd ms-frontend
          npx tsc --noEmit

      - name: Run Production Bundle Verification
        run: |
          cd ms-frontend
          npm run build
